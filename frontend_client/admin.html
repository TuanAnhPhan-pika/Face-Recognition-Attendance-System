<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin - Face Recognition Attendance</title>
  <style>
    body{font-family:Arial,Helvetica,sans-serif;padding:16px}
    input,button{margin:4px}
    img{max-width:160px;border:1px solid #ddd}
    .user{border:1px solid #eee;padding:8px;margin:6px 0;display:flex;justify-content:space-between}
    .controls{margin-bottom:12px}
  </style>
</head>
<body>
  <h2>Admin - Quản lý Users</h2>
  <div class="controls">
    <label>Backend URL: <input id="backend" value="http://localhost:3000" style="width:300px" /></label>
    <label style="margin-left:12px">Admin Token: <input id="token" placeholder="x-admin-token" style="width:200px" /></label>
    <input type="hidden" id="modelPath" value="/frontend/models" />
  </div>

  <div class="controls">
    <button id="refresh">Lấy danh sách users</button>
    <button id="loadAttendance">Tải lịch sử điểm danh</button>
    <button id="addEmployee" style="margin-left:12px">Thêm nhân viên</button>
  </div>

  <div id="capturePanel" style="display:none;margin-top:12px;border:1px solid #ddd;padding:12px">
    <h3>Đăng ký nhân viên mới</h3>
    <div>
      <label>Tên: <input id="newName" placeholder="Tên nhân viên" style="width:220px" /></label>
      <button id="startCapture">Bắt đầu capture</button>
      <button id="cancelCapture">Huỷ</button>
    </div>
    <div style="margin-top:8px; position:relative; display:inline-block;">
        <video id="capVideo" autoplay playsinline width="320" height="240" style="border:1px solid #ccc; display:block"></video>
        <div id="countdown" style="position:absolute;left:0;top:0;width:320px;height:240px;display:none;align-items:center;justify-content:center;font-size:72px;color:#fff;text-shadow:0 2px 8px rgba(0,0,0,0.8);pointer-events:none"></div>
        <canvas id="capCanvas" width="320" height="240" style="display:none"></canvas>
        <div id="capLog" style="margin-top:6px;color:#333"></div>
      </div>
  </div>

  <div id="log" style="margin-top:8px;color:#333"></div>

  <h3>Users</h3>
  <div id="users"></div>

  <h3>Lịch sử điểm danh</h3>
  <div id="attendanceList"></div>

  <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
  <script>
    const backendInput = document.getElementById('backend');
    const tokenInput = document.getElementById('token');
    const refreshBtn = document.getElementById('refresh');
    const loadAttendanceBtn = document.getElementById('loadAttendance');
    const log = document.getElementById('log');
    const usersDiv = document.getElementById('users');
    const attendanceDiv = document.getElementById('attendanceList');
    const MODEL_PATHS = ['/frontend/models', 'https://justadudewhohacks.github.io/face-api.js/models'];

    refreshBtn.addEventListener('click', refreshUsers);
    loadAttendanceBtn.addEventListener('click', loadAttendance);

    async function refreshUsers() {
      const backend = backendInput.value.trim();
      const token = tokenInput.value.trim();
      try {
        const res = await fetch(backend + '/api/users', { headers: { 'x-admin-token': token } });
        if (!res.ok) { const t = await res.text(); log.innerText = 'Lỗi tải users: ' + t; return; }
        const data = await res.json();
        usersDiv.innerHTML = '';
        data.forEach(u => {
          const d = document.createElement('div'); d.className = 'user';
          const info = document.createElement('div'); info.innerText = `${u.id} — ${u.name}`;
          const del = document.createElement('button'); del.innerText = 'Xoá'; del.addEventListener('click', () => deleteUser(u.id));
          d.appendChild(info); d.appendChild(del); usersDiv.appendChild(d);
        });
      } catch (err) { log.innerText = 'Lỗi kết nối: ' + err.message; }
    }

    async function deleteUser(id) {
      const backend = backendInput.value.trim(); const token = tokenInput.value.trim();
      if (!confirm('Xoá user ' + id + ' ?')) return;
      try {
        const res = await fetch(backend + '/api/users/' + id, { method: 'DELETE', headers: { 'x-admin-token': token } });
        const j = await res.json();
        if (res.ok) { log.innerText = 'Xoá thành công'; refreshUsers(); } else log.innerText = 'Lỗi: ' + JSON.stringify(j);
      } catch (err) { log.innerText = 'Lỗi kết nối: ' + err.message; }
    }

    // --- Admin single-shot capture for adding users ---
    const addBtn = document.getElementById('addEmployee');
    const capturePanel = document.getElementById('capturePanel');
    const startCaptureBtn = document.getElementById('startCapture');
    const cancelCaptureBtn = document.getElementById('cancelCapture');
    const capVideo = document.getElementById('capVideo');
    const capCanvas = document.getElementById('capCanvas');
    const capLog = document.getElementById('capLog');
    let capStream = null;

    async function loadModels() {
      try {
        const already = faceapi && faceapi.nets && faceapi.nets.tinyFaceDetector && faceapi.nets.tinyFaceDetector.params;
        if (already) return true;
      } catch (e) {}
      for (const p of MODEL_PATHS) {
        try {
          await faceapi.nets.tinyFaceDetector.loadFromUri(p);
          await faceapi.nets.faceLandmark68Net.loadFromUri(p);
          await faceapi.nets.faceRecognitionNet.loadFromUri(p);
          return true;
        } catch (e) {
          console.warn('load failed', p, e);
        }
      }
      return false;
    }

    addBtn.addEventListener('click', () => {
      capturePanel.style.display = 'block';
      capLog.innerText = '';
      document.getElementById('newName').focus();
    });

    cancelCaptureBtn.addEventListener('click', () => {
      if (capStream) { capStream.getTracks().forEach(t => t.stop()); capStream = null; }
      capturePanel.style.display = 'none';
    });

    startCaptureBtn.addEventListener('click', async () => {
      const backend = backendInput.value.trim();
      const name = document.getElementById('newName').value.trim();
      if (!name) { capLog.innerText = 'Vui lòng nhập tên nhân viên.'; return; }
      try {
          capLog.innerText = 'Đang tải mô hình nhận diện...';
          const modelsOk = await loadModels();
          if (!modelsOk) {
            capLog.innerText = 'Không tải được face-api models.';
            startCaptureBtn.disabled = false;
            return;
          }
          capLog.innerText = 'Đang mở camera...';
          startCaptureBtn.disabled = true;
          capStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
          capVideo.srcObject = capStream;
          await new Promise(resolve => capVideo.onloadedmetadata = resolve);
          // 5s countdown before capture
          const countdownEl = document.getElementById('countdown');
          countdownEl.style.display = 'flex';
          for (let i = 5; i >= 1; i--) {
            countdownEl.innerText = i;
            await new Promise(r => setTimeout(r, 1000));
          }
          countdownEl.style.display = 'none';
          // capture single frame
          const ctx = capCanvas.getContext('2d');
          capCanvas.width = capVideo.videoWidth || 320; capCanvas.height = capVideo.videoHeight || 240;
          ctx.drawImage(capVideo, 0, 0, capCanvas.width, capCanvas.height);
          // stop camera
          capStream.getTracks().forEach(t => t.stop()); capStream = null;
          const detection = await faceapi.detectSingleFace(capCanvas, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();
          if (!detection || !detection.descriptor) {
            capLog.innerText = 'Không phát hiện được khuôn mặt để đăng ký.';
            startCaptureBtn.disabled = false;
            return;
          }
          const dataUrl = capCanvas.toDataURL('image/jpeg', 0.9);
          const embedding = Array.from(detection.descriptor);
          capLog.innerText = 'Đang gửi dữ liệu để tạo user...';
          const res = await fetch(backend + '/api/users', { method: 'POST', headers: { 'Content-Type': 'application/json', 'x-admin-token': tokenInput.value.trim() }, body: JSON.stringify({ name, image: dataUrl, embedding }) });
          const j = await res.json();
          if (res.ok) {
            capLog.innerText = 'Tạo nhân viên thành công.';
            refreshUsers();
          } else {
            capLog.innerText = 'Lỗi: ' + (j && j.error ? j.error : JSON.stringify(j));
          }
          startCaptureBtn.disabled = false;
          // hide panel after brief message
          setTimeout(() => { capturePanel.style.display = 'none'; document.getElementById('newName').value = ''; }, 1200);
        } catch (err) {
          capLog.innerText = 'Lỗi camera/gửi: ' + err.message;
          if (capStream) { capStream.getTracks().forEach(t => t.stop()); capStream = null; }
          startCaptureBtn.disabled = false;
        }
    });

    async function loadAttendance() {
      const backend = backendInput.value.trim();
      try {
        const res = await fetch(backend + '/api/attendance');
        if (!res.ok) { log.innerText = 'Lỗi tải lịch sử: ' + await res.text(); return; }
        const data = await res.json();
        attendanceDiv.innerHTML = '';
        data.forEach(a => {
          const d = document.createElement('div'); d.className = 'user';
          const left = document.createElement('div');
          left.innerHTML = `<strong>${a.name}</strong><br/><small>${a.time}</small><br/><small>Device: ${a.device_id || ''}</small>`;
          const right = document.createElement('div');
          if (a.image) { const img = document.createElement('img'); img.src = a.image.startsWith('/') ? backend + a.image : a.image; img.style.maxWidth='120px'; right.appendChild(img); }
          d.appendChild(left); d.appendChild(right); attendanceDiv.appendChild(d);
        });
      } catch (err) { log.innerText = 'Lỗi kết nối: ' + err.message; }
    }
  </script>
</body>
</html>
